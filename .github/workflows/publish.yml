name: Publish

on:
  workflow_dispatch:
    inputs:
      repository:
        description: "Package repository to publish to"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ inputs.repository }}
  cancel-in-progress: false

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --locked --python 3.14

      - name: Run tests
        run: uv run pytest

      - name: Build artifacts
        run: uv build

      - name: Check artifact metadata
        run: uv run twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-distributions
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish to ${{ inputs.repository }}
    runs-on: ubuntu-latest
    needs: build
    environment: ${{ inputs.repository }}

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: release-distributions
          path: dist

      - name: Publish to TestPyPI
        if: inputs.repository == 'testpypi'
        uses: pypa/gh-action-pypi-publish@v1.9.0
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Publish to PyPI
        if: inputs.repository == 'pypi'
        uses: pypa/gh-action-pypi-publish@v1.9.0
